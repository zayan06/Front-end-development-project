<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Signal Academy</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        nav { background: #2c3e50; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }

        .container { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .question-box { background: #e8f6f3; padding: 20px; border-radius: 8px; border-left: 5px solid #1abc9c; }
        
        
        .option-group { margin: 15px 0; }
        
        
        .feedback { display: none; margin-top: 5px; margin-left: 28px; font-weight: bold; font-size: 0.9em; }
        
        input[type="radio"]:checked ~ .feedback { display: block; }
        
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }

        input[type="radio"] { transform: scale(1.2); cursor: pointer; }
        label { cursor: pointer; font-size: 1.1em; margin-left: 8px; }

        button { background: #34495e; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #2c3e50; }
    </style>
</head>
<body>

    <nav>
    <a href="index.html">Home</a>
    <a href="register.html">Register</a>
    <a href="learn.html">Lights</a>
    <a href="learn_row.html">Right of Way</a>
    <a href="quiz.html">Quiz</a>
    <a href="contact.html">Contact</a>
</nav>

    <div class="container">
        <h1>Final Assessment</h1>
        <p>Select an answer to see the result immediately.</p>
        
        <form>
            <div class="question-box">
                <p><strong>Question 1:</strong> What should you do when the light turns solid yellow?</p>
                
                <div class="option-group">
                    <input type="radio" name="q1" id="opt1">
                    <label for="opt1">Speed up to beat the red</label>
                    <div class="feedback wrong">❌ Incorrect. This is dangerous!</div>
                </div>

                <div class="option-group">
                    <input type="radio" name="q1" id="opt2">
                    <label for="opt2">Stop safely if possible</label>
                    <div class="feedback correct">✅ Correct! Always prepare to stop.</div>
                </div>

                <div class="option-group">
                    <input type="radio" name="q1" id="opt3">
                    <label for="opt3">Honk your horn</label>
                    <div class="feedback wrong">❌ Incorrect. Horns are for emergencies only.</div>
                </div>
            </div>

            <button type="reset">Reset Quiz</button>
        </form>
    </div>

</body>
</html>
